<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tabellone Finali Nazionali U14</title> 
  <script type="module" crossorigin src="/bsk-tst-2026/assets/modulepreload-polyfill-C_i49-21.js"></script>
  <script type="module" crossorigin src="/bsk-tst-2026/assets/U14_FN-Clf0s_hS.js"></script>
  <link rel="stylesheet" crossorigin href="/bsk-tst-2026/assets/u14_fn-DWcJuOax.css">
</head>
<body>

    <div id="poster-overlay">
        <img src="U14_FN_Poster.jpeg" alt="Poster Torneo U14 FN">
    </div>

    <div class="top-bar">
        <div class="top-left-controls">
            <label for="display-mode">Visualizza</label>
            <select id="display-mode">
                <option value="REGIONE">Regione</option>
                <option value="CITTA">Città</option>
                <option value="SQUADRA">Squadra</option>
                <option value="NICKNAME" selected>Nickname</option>
            </select>
        </div>

        <div class="mobile-hint">📱 Trascina e pizzica per zoomare</div>
    </div>

    <div class="search-panel">
        <div class="search-panel-title">Trova Incrocio Scontro</div>
        <div class="search-selects">
            <select id="search-team-1">
                <option value="">Squadra 1...</option>
            </select>
            <span style="font-size:12px; font-weight:bold; color:#64748b;">VS</span>
            <select id="search-team-2">
                <option value="">Squadra 2...</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <button id="show-classifica">🏆</button> 
        <button id="zoom-in">➕ Zoom</button>
        <button id="zoom-out">➖ Zoom</button>
        <button id="zoom-reset">🔄 </button>
    </div>

    <div id="panzoom-container">
        <div class="panzoom-wrapper" id="panzoom-wrapper">
            <div id="tournament-bracket">
                <svg id="bracket-lines"></svg>
                Caricamento dati...
            </div>

            <div id="classifica-fissa-container" class="classifica-fissa-panel">
                <h3>🏆 Classifica Finale</h3>
                <table class="classifica-table fissa">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Squadra</th>
                            <th>Punti</th>
                            <th>V</th>
                            <th>S</th>
                            <th>PF</th>
                            <th>PS</th>
                        </tr>
                    </thead>
                    <tbody id="classifica-fissa-tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="classifica-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Classifica Finali Nazionali U14</h2>
                <button id="close-classifica" class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <table class="classifica-table">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Squadra</th>
                            <th>Punti</th>
                            <th>V</th>
                            <th>S</th>
                            <th>PF</th>
                            <th>PS</th>
                        </tr>
                    </thead>
                    <tbody id="classifica-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
