<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket Voice Assistant - Turiddu Edition</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212;
            color: white;
            margin: 0;
            padding: 15px;
        }

        /* Riga superiore: Video a sinistra, Status a destra */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #video-container {
            width: 80px; /* Ridotto */
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            background: #333;
        }

        video {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #status-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: red;
            transition: 0.3s;
            border: 3px solid white;
        }

        .active {
            background: #00ff00 !important;
            box-shadow: 0 0 15px #00ff00;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.8em;
        }

        /* Lista Roster Centrale */
        #roster-list {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #333;
            max-height: 250px;
            overflow-y: auto;
        }

        .roster-item {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 5px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.9em;
        }

        /* Log in basso */
        #log {
            width: 90%;
            max-width: 400px;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            height: 120px;
            overflow-y: auto;
            color: #00ff00;
            font-family: monospace;
        }

        button {
            padding: 15px 30px;
            font-size: 1em;
            border-radius: 30px;
            border: none;
            background: #ff6600;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>

  <script type="module" crossorigin src="/bsk-tst-2026/assets/voicerecognition-CHZPep9c.js"></script>
  <link rel="modulepreload" crossorigin href="/bsk-tst-2026/assets/modulepreload-polyfill-Dct9-obz.js">
</head>

<body>
    <h1>Basket Assistant</h1>

    <div class="top-bar">
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <div id="status-indicator"></div>
        <div class="controls">
            <label><input type="checkbox" id="enableVoice" checked> Voce</label>
        </div>
    </div>

    <button id="startBtn">ATTIVA SISTEMA</button>

    <div id="roster-list">
        <div style="text-align: center; color: #666;">Il roster apparirà qui all'avvio</div>
    </div>

    <div id="log">
        <div style="color: #444;">In attesa di comandi...</div>
    </div>

</body>

</html>
