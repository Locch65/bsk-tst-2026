<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>I Miei Tornei FITP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            font-family: Arial, sans-serif;
            touch-action: auto;
        }
        iframe {
            border: none;
            height: 100%;
            width: 100%;
            touch-action: auto;
        }
        
        /* Struttura colonne */
        #contenitore-sinistra, #contenitore-destra {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #contenitore-sinistra { width: 100%; }
        #drag-bar, #contenitore-destra { display: none; }
        
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            background: #fff;
            padding-bottom: 60px; 
            box-sizing: border-box;
        }
        
        /* Barre dei bottoni ottimizzate */
        .toolbar {
            background-color: #f1f1f1;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #ccc;
            justify-content: center;
            flex-wrap: wrap;
            touch-action: auto;
        }

        /* Contenitore Intestazione */
        .header-torneo {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-bottom: 5px;
        }
        
        /* Bottone Selettore Principale (Verde) */
        .btn-seleziona-torneo {
            background: #28a745;
            color: white;
            border: 1px solid #1e7e34;
            padding: 6px 16px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
            max-width: 60%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }
        .btn-seleziona-torneo:hover { background: #218838; }

        /* Bottone Collegamento Esterno FITP */
        .btn-link-fitp {
            background: #007bff;
            color: white;
            border: 1px solid #0069d9;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s;
        }
        .btn-link-fitp:hover { background: #0062cc; }
        
        /* Bottoni grandi per Mobile Touch */
        .btn-azione {
            padding: 6px 12px;
            border: 1px solid #999;
            background-color: #fff;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            flex-grow: 1;
            max-width: 170px;
            text-align: center;
        }
        .btn-azione:hover { background-color: #e0e0e0; }
        .btn-azione.attivo {
            background-color: #0056b3;
            color: white;
            border-color: #004085;
            font-weight: bold;
        }
        .btn-azione:disabled {
            background-color: #e9ecef;
            color: #adb5bd;
            border-color: #ced4da;
            cursor: not-allowed;
        }

        /* Stili dei Popup Modali */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            user-select: text;
            display: flex;
            flex-direction: column;
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 8px;}
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; flex-wrap: wrap; }
        .btn-modal { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-salva { background: #28a745; color: white; }
        .btn-chiudi { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        
        /* Contenitore Bottoni Gestione con Spazio Superiore */
        .modal-management-buttons {
            display: flex; 
            justify-content: space-between; 
            gap: 10px;
            margin-top: 25px;
        }

        /* Contenitore Bottone Chiudi Centrato */
        .modal-close-container {
            border-top: 1px solid #eee; 
            padding-top: 15px;
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        /* Lista Tornei Interna al Popup */
        .lista-tornei-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .torneo-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        .torneo-item:last-child { border-bottom: none; }
        .torneo-item:hover { background: #f8f9fa; }
        .torneo-item.selezionato { background: #e2f0fe; font-weight: bold; }
        
        .torneo-item-info {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }
        .torneo-item-actions {
            display: none;
            gap: 5px;
        }
        .torneo-item.selezionato .torneo-item-actions {
            display: flex;
        }
        .btn-mini {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #999;
            background: white;
            cursor: pointer;
        }
        .btn-mini-select { background: #0056b3; color: white; border-color: #004085; font-weight: bold; }
        .btn-mini-edit { background: #ffc107; color: #212529; border-color: #ffc107; font-weight: bold; }

        /* Layout Split Screen */
        body.split-enabled #contenitore-sinistra { width: calc(50% - 3px); }
        body.split-enabled #contenitore-destra { display: flex; width: calc(50% - 3px); }
        body.split-enabled #drag-bar {
            display: block;
            width: 6px;
            background-color: #ccc;
            cursor: col-resize;
            position: relative;
            z-index: 20;
        }
        body.split-enabled #drag-bar:hover,
        body.split-enabled #drag-bar.active {
            background-color: #666;
        }

        .no-pointer { pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="contenitore-sinistra">
        <div class="toolbar" id="toolbar-sinistra">
            <button onclick="avviaLoginDinamicoFITP()" style="background:#007bff; color:white; padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer;">
            🔄 Sincronizza Account FITP
            </button>
            <div class="header-torneo">
                <button class="btn-seleziona-torneo" id="btn-cambia-torneo">Caricamento...</button>
                <a href="#" target="_blank" class="btn-link-fitp" id="btn-sito-fitp">Sito FITP</a>
            </div>
            <button class="btn-azione attivo" id="btn-qualificazioni">Qualificazioni</button>
            <button class="btn-azione" id="btn-finale">Finale</button>
        </div>
        <div class="toolbar" id="toolbar-date"></div>
        
        <div class="iframe-wrapper">
            <iframe src="" id="sinistra"></iframe>
        </div>
    </div>
    
    <div id="drag-bar"></div>
    
    <div id="contenitore-destra">
        <div class="iframe-wrapper">
            <iframe src="" id="destra"></iframe>
        </div>
    </div>

    <div class="modal-overlay" id="modal-lista">
        <div class="modal-content">
            <h3>Seleziona Torneo:</h3>
            <div class="lista-tornei-container" id="lista-tornei-render">
                </div>
            <div class="modal-management-buttons">
                <button class="btn-modal btn-danger" id="btn-cancella-torneo" disabled>Cancella Torneo</button>
                <button class="btn-modal btn-salva" id="btn-aggiungi-torneo">Aggiungi Torneo</button>
            </div>
            <div class="modal-close-container">
                <button class="btn-modal btn-chiudi" id="btn-lista-chiudi">Chiudi</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-config">
        <div class="modal-content">
            <h3 id="titolo-config">Configurazione Torneo</h3>
            <div class="form-group">
                <label>Nome Torneo</label>
                <input type="text" id="input-nome">
            </div>
            <div class="form-group">
                <label>ID Competizione</label>
                <input type="text" id="input-competizione">
            </div>
            <div class="form-group">
                <label>ID Torneo</label>
                <input type="text" id="input-id">
            </div>
            <div class="form-group">
                <label>ID FASE 1 (Qualificazioni)</label>
                <input type="text" id="input-fase1">
            </div>
            <div class="form-group">
                <label>ID FASE 2 (Finale)</label>
                <input type="text" id="input-fase2">
            </div>
            <div class="modal-buttons">
                <button class="btn-modal btn-chiudi" id="btn-modal-chiudi">Annulla</button>
                <button class="btn-modal btn-salva" id="btn-modal-salva">Salva</button>
            </div>
        </div>
    </div>

    <script>
        const leftIframe = document.getElementById('sinistra');
        const rightIframe = document.getElementById('destra');
        const leftContainer = document.getElementById('contenitore-sinistra');
        const rightContainer = document.getElementById('contenitore-destra');
        const divider = document.getElementById('drag-bar');
        const toolbarDate = document.getElementById('toolbar-date');
        const btnQualificazioni = document.getElementById('btn-qualificazioni');
        const btnFinale = document.getElementById('btn-finale');
        const btnCambiaTorneo = document.getElementById('btn-cambia-torneo');
        const btnSitoFitp = document.getElementById('btn-sito-fitp');

        // --- STRUTTURA DATI E LOCALSTORAGE ---
        const DEFAULT_TORNEI = [
            { id_locale: "1", nome: "Torneo Green Park", id_competizione: "338EDFBC-15E8-4D5E-8BA2-A5B4CBFF4E01", id_torneo: "9989D074-DB84-4CA6-943A-D16643E4A1CD", fase1: "", fase2: "D88D6A9F-EFB8-4599-B725-1804F221C88A" },
            { id_locale: "2", nome: "Torneo Sport Village Bertolla", id_competizione: "5D5E6847-F66A-4427-BF78-DC8CB9AD29B4", id_torneo: "5D5E6847-F66A-4427-BF78-DC8CB9AD29B4", fase1: "3D4FDD1E-211D-4AA6-BAE9-8ED3F443ECA7", fase2: "4D7218BA-DD69-4B84-8FCE-32AF1442D8D7" }
        ];

        let listaTornei = JSON.parse(localStorage.getItem('fit_lista_tornei'));
        if (!listaTornei || listaTornei.length === 0) {
            listaTornei = DEFAULT_TORNEI;
            localStorage.setItem('fit_lista_tornei', JSON.stringify(listaTornei));
        }

        let attivoIdLocale = localStorage.getItem('fit_attivo_id_locale') || "1";
        let torneoAttivo = listaTornei.find(t => t.id_locale === attivoIdLocale) || listaTornei[0];
        
        if(torneoAttivo) {
            attivoIdLocale = torneoAttivo.id_locale;
            localStorage.setItem('fit_attivo_id_locale', attivoIdLocale);
        }

        btnCambiaTorneo.innerText = torneoAttivo ? torneoAttivo.nome : "Seleziona Torneo:";

        const TOURNAMENT_ID = torneoAttivo ? torneoAttivo.id_torneo : "";
        const COMPETITION_ID = torneoAttivo ? (torneoAttivo.id_competizione || torneoAttivo.id_torneo) : "";
        const FASE1 = torneoAttivo ? torneoAttivo.fase1 : "";
        const FASE2 = torneoAttivo ? torneoAttivo.fase2 : "";

        // Imposta l'URL dinamico del bottone Sito FITP
        if (COMPETITION_ID) {
            btnSitoFitp.href = `https://www.fitp.it/Tornei/Dettaglio-Competizione?competitionId=${COMPETITION_ID}`;
        } else {
            btnSitoFitp.style.display = "none";
        }

        const urlQualificazioni = `https://www.fitp.it/Tornei/Areas/Federtennis/Scripts/Puc/Tabellone_v2?tournamentId=${TOURNAMENT_ID}&phaseId=${FASE1}&intestazione=0&isDouble=0`;
        const urlFinaleTabellone = `https://www.fitp.it/Tornei/Areas/Federtennis/Scripts/Puc/Tabellone_v2?tournamentId=${TOURNAMENT_ID}&phaseId=${FASE2}&intestazione=0&isDouble=0`;
        const baseUrlDestra = `https://docs.google.com/gview?url=https://sgatapiexternalv2.azurewebsites.net/DigitalPlatform/getorderofplay?competitionUID=${COMPETITION_ID}%26fileName%3Dorariodigioco_`;
        
        if (!FASE1) btnQualificazioni.disabled = true;
        if (!FASE2) btnFinale.disabled = true;

        let urlInizialeTabellone = urlQualificazioni;
        if (!FASE1 && FASE2) {
            urlInizialeTabellone = urlFinaleTabellone;
            btnQualificazioni.classList.remove('attivo');
            btnFinale.classList.add('attivo');
        }

        let isSplitMode = false;
        function checkSplitEligibility() {
            const ua = navigator.userAgent.toLowerCase();
            return !/mobile|android|iphone|ipad|phone/i.test(ua) || (window.screen.width >= 1024 || window.screen.height >= 1024);
        }

        if (checkSplitEligibility()) {
            isSplitMode = true;
            document.body.classList.add('split-enabled');
            rightContainer.insertBefore(toolbarDate, rightContainer.firstChild);
            leftIframe.src = urlInizialeTabellone;
        } else {
            leftIframe.src = urlInizialeTabellone;
        }

        // --- LOGICA GESTIONE LISTA POPUP ---
        const modalLista = document.getElementById('modal-lista');
        const modalConfig = document.getElementById('modal-config');
        const listaRenderContainer = document.getElementById('lista-tornei-render');
        const btnCancellaTorneo = document.getElementById('btn-cancella-torneo');
        
        let idTorneoInModifica = null; 
        let idSelezionatoInLista = null; 

        btnCambiaTorneo.addEventListener('click', () => {
            renderListaTornei();
            modalLista.style.display = 'flex';
        });

        document.getElementById('btn-lista-chiudi').addEventListener('click', () => modalLista.style.display = 'none');

        function renderListaTornei() {
            listaRenderContainer.innerHTML = "";
            idSelezionatoInLista = null;
            btnCancellaTorneo.disabled = true;

            listaTornei.forEach(t => {
                const item = document.createElement('div');
                item.className = 'torneo-item';

                const info = document.createElement('div');
                info.className = 'torneo-item-info';
                info.innerText = t.id_locale === attivoIdLocale ? `⭐ ${t.nome}` : t.nome;

                const actions = document.createElement('div');
                actions.className = 'torneo-item-actions';

                const btnMiniSelect = document.createElement('button');
                btnMiniSelect.className = 'btn-mini btn-mini-select';
                btnMiniSelect.innerText = 'Seleziona';
                btnMiniSelect.addEventListener('click', (e) => {
                    e.stopPropagation();
                    localStorage.setItem('fit_attivo_id_locale', t.id_locale);
                    modalLista.style.display = 'none';
                    window.location.reload();
                });

                const btnMiniEdit = document.createElement('button');
                btnMiniEdit.className = 'btn-mini btn-mini-edit';
                btnMiniEdit.innerText = '+';
                btnMiniEdit.addEventListener('click', (e) => {
                    e.stopPropagation();
                    apriConfigurazioneDettagli(t.id_locale);
                });

                actions.appendChild(btnMiniSelect);
                actions.appendChild(btnMiniEdit);
                item.appendChild(info);
                item.appendChild(actions);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.torneo-item').forEach(i => i.classList.remove('selezionato'));
                    item.classList.add('selezionato');
                    idSelezionatoInLista = t.id_locale;
                    btnCancellaTorneo.disabled = false;
                });

                listaRenderContainer.appendChild(item);
            });
        }

        document.getElementById('btn-aggiungi-torneo').addEventListener('click', () => {
            apriConfigurazioneDettagli(null);
        });

        btnCancellaTorneo.addEventListener('click', () => {
            if(!idSelezionatoInLista) return;
            
            const torneoDaCancellare = listaTornei.find(t => t.id_locale === idSelezionatoInLista);
            if(!torneoDaCancellare) return;

            if(listaTornei.length <= 1) {
                alert("Devi mantenere almeno un torneo in lista!");
                return;
            }
            
            const conferma = confirm(`Sei sicuro di voler cancellare definitivamente il torneo "${torneoDaCancellare.nome}"?`);
            if (!conferma) return; 
            
            listaTornei = listaTornei.filter(t => t.id_locale !== idSelezionatoInLista);
            localStorage.setItem('fit_lista_tornei', JSON.stringify(listaTornei));
            
            if(idSelezionatoInLista === attivoIdLocale) {
                localStorage.setItem('fit_attivo_id_locale', listaTornei[0].id_locale);
                window.location.reload();
            } else {
                renderListaTornei();
            }
        });

        // --- POPUP SCHEDA DETTAGLI ---
        function apriConfigurazioneDettagli(idLocale) {
            idTorneoInModifica = idLocale;
            if(idLocale) {
                const t = listaTornei.find(x => x.id_locale === idLocale);
                document.getElementById('titolo-config').innerText = "Modifica Dettagli Torneo";
                document.getElementById('input-nome').value = t.nome;
                document.getElementById('input-id').value = t.id_torneo;
                document.getElementById('input-competizione').value = t.id_competizione || t.id_torneo || "";
                document.getElementById('input-fase1').value = t.fase1;
                document.getElementById('input-fase2').value = t.fase2;
            } else {
                document.getElementById('titolo-config').innerText = "Nuovo Torneo";
                document.getElementById('input-nome').value = "Nuovo Torneo FIT";
                document.getElementById('input-id').value = "";
                document.getElementById('input-competizione').value = "";
                document.getElementById('input-fase1').value = "";
                document.getElementById('input-fase2').value = "";
            }
            modalConfig.style.display = 'flex';
        }

        document.getElementById('btn-modal-chiudi').addEventListener('click', () => {
            modalConfig.style.display = 'none';
        });

        document.getElementById('btn-modal-salva').addEventListener('click', () => {
            const nome = document.getElementById('input-nome').value.trim() || "Torneo senza nome";
            const id_torneo = document.getElementById('input-id').value.trim();
            const id_competizione = document.getElementById('input-competizione').value.trim();
            const fase1 = document.getElementById('input-fase1').value.trim();
            const fase2 = document.getElementById('input-fase2').value.trim();

            if(!idTorneoInModifica) {
                const nuovoIdLocale = String(Date.now());
                const nuovoTorneo = { id_locale: nuevoIdLocale, nome, id_torneo, id_competizione, fase1, fase2 };
                listaTornei.push(nuovoTorneo);
                localStorage.setItem('fit_lista_tornei', JSON.stringify(listaTornei));
                localStorage.setItem('fit_attivo_id_locale', nuovoIdLocale); 
            } else {
                const t = listaTornei.find(x => x.id_locale === idTorneoInModifica);
                t.nome = nome;
                t.id_torneo = id_torneo;
                t.id_competizione = id_competizione;
                t.fase1 = fase1;
                t.fase2 = fase2;
                localStorage.setItem('fit_lista_tornei', JSON.stringify(listaTornei));
            }

            modalConfig.style.display = 'none';
            modalLista.style.display = 'none';
            window.location.reload();
        });

        // --- GESTIONE BOTTONI TABELLONI ---
        btnQualificazioni.addEventListener('click', function() {
            if (!FASE1) return;
            disattivaBottoniDate();
            btnFinale.classList.remove('attivo');
            this.classList.add('attivo');
            leftIframe.src = urlQualificazioni;
        });

        btnFinale.addEventListener('click', function() {
            if (!FASE2) return;
            disattivaBottoniDate();
            btnQualificazioni.classList.remove('attivo');
            this.classList.add('attivo');
            leftIframe.src = urlFinaleTabellone;
        });

        // --- GESTIONE BOTTONI DATE ---
        function inizializzaBottoniDate() {
            const opzioni = [{ etichetta: "Ieri", offset: -1 }, { etichetta: "Oggi", offset: 0 }, { etichetta: "Domani", offset: 1 }, { etichetta: "Dopodomani", offset: 2 }];
            opzioni.forEach(opzione => {
                const dataCorrente = new Date();
                dataCorrente.setDate(dataCorrente.getDate() + opzione.offset);
                const anno = dataCorrente.getFullYear();
                const mese = String(dataCorrente.getMonth() + 1).padStart(2, '0');
                const giorno = String(dataCorrente.getDate()).padStart(2, '0');
                const dataUrl = `${anno}${mese}${giorno}`;
                const dataBottone = `${giorno}/${mese}`;

                const bottone = document.createElement('button');
                bottone.className = 'btn-azione btn-data-classe';
                bottone.innerText = `${opzione.etichetta} (${dataBottone})`;
                
                if (opzione.offset === 0 && isSplitMode) {
                    bottone.classList.add('attivo');
                    rightIframe.src = `${baseUrlDestra}${dataUrl}.pdf&embedded=true`;
                }

                bottone.addEventListener('click', function() {
                    if (!isSplitMode) {
                        btnQualificazioni.classList.remove('attivo');
                        btnFinale.classList.remove('attivo');
                    }
                    
                    document.querySelectorAll('#toolbar-date .btn-azione').forEach(b => b.classList.remove('attivo'));
                    bottone.classList.add('attivo');

                    if (isSplitMode) {
                        rightIframe.src = `${baseUrlDestra}${dataUrl}.pdf&embedded=true`;
                    } else {
                        leftIframe.src = `${baseUrlDestra}${dataUrl}.pdf&embedded=true`;
                    }
                });
                toolbarDate.appendChild(bottone);
            });
        }

        function disattivaBottoniDate() {
            document.querySelectorAll('#toolbar-date .btn-azione').forEach(b => b.classList.remove('attivo'));
        }

        if (isSplitMode) {
            let isDragging = false;

            divider.addEventListener('mousedown', () => {
                isDragging = true;
                divider.classList.add('active');
                leftContainer.classList.add('no-pointer');
                rightContainer.classList.add('no-pointer');
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let percentage = (e.clientX / window.innerWidth) * 100;
                if (percentage < 15) percentage = 15;
                if (percentage > 85) percentage = 85;

                leftContainer.style.width = `calc(${percentage}% - 3px)`;
                rightContainer.style.width = `calc(${100 - percentage}% - 3px)`;
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    divider.classList.remove('active');
                    leftContainer.classList.remove('no-pointer');
                    rightContainer.classList.remove('no-pointer');
                }

async function controllaRitornoDaLogin() {

/**
 * 3. RECUPERA IL PROFILO E GENERA I DATIBODY COMPLETI
 * Invia una richiesta API a FITP usando il nuovo Token per farsi restituire l'hashKey fresco.
 */
async function inizializzaDatiProfilo(token) {
    const guidUtenteFisso = "4a6d96c2-dedd-4bb1-8f07-f7444047b1b3";
    const b2cGuidFisso = "b7478c31-1eb7-4193-ac4d-a32f7276800b";

    const bodyIniziale = {
        guid: guidUtenteFisso,
        member: "1",
        teacher: "0",
        udg: "0",
        acceptProfilation: "0",
        hashKey: "", 
        b2cGuid: b2cGuidFisso,
        fromTpra: false,
        key: guidUtenteFisso
    };

    try {
        const response = await fetch("https://dp-myfit-test-function-v2.azurewebsites.net/api/v1/login/profilo/get", {
            method: "POST",
            mode: "cors",
            credentials: "include",
            headers: {
                "Accept": "application/json, text/javascript, */*; q=0.01",
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`,
                "Referer": "https://www.fitp.it/"
            },
            body: JSON.stringify(bodyIniziale)
        });

        if (response.ok) {
            const resData = await response.json();
            
            if (resData && resData.profilo && resData.profilo[0]) {
                const infoProfilo = resData.profilo[0];
                
                // Salviamo l'oggetto definitivo contenente l'hashKey di sessione appena generato
                sessioneMyFit.datiBody = {
                    guid: infoProfilo.guid,
                    member: String(infoProfilo.member),
                    teacher: String(infoProfilo.teacher),
                    udg: String(infoProfilo.udg),
                    acceptProfilation: String(infoProfilo.acceptProfilation),
                    hashKey: infoProfilo.hashKey, // <--- Aggiornato automaticamente!
                    b2cGuid: infoProfilo.b2cGuid,
                    fromTpra: infoProfilo.from_Tpra,
                    key: infoProfilo.guid
                };

                localStorage.setItem('myfit_dati_body', JSON.stringify(sessioneMyFit.datiBody));
                console.log("Sincronizzazione completata con successo!", sessioneMyFit.datiBody);
                alert("Account sincronizzato correttamente! Ora puoi usare l'app.");
            }
        } else {
            console.error("Il server non ha restituito i dettagli del profilo.");
        }
    } catch (err) {
        console.error("Errore di rete durante il recupero del profilo:", err);
    }
}
